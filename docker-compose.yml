services:
  caddy:
    image: caddy:2-alpine
    container_name: q7x-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/index.html:/srv/www/index.html:ro
      - ./chat.html:/srv/chat/chat.html:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    dns:
      - 1.1.1.1
      - 8.8.8.8

  ollama:
    image: ollama/ollama
    container_name: q7x-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    dns:
      - 1.1.1.1
      - 8.8.8.8

volumes:
  caddy_data:
  caddy_config:
  ollama_data:

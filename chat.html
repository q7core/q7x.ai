<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>q7x.ai</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0a;
    --surface:   #111111;
    --border:    #222222;
    --border-hi: #333333;
    --text:      #e2e2e2;
    --muted:     #555555;
    --accent:    #00ff88;
    --accent-dim:#00ff8833;
    --warn:      #ff4444;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

  /* ── LOGIN ─────────────────────────────────────────────── */
  #login-screen {
    position: fixed; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
  }
  #login-screen.hidden { display: none; }

  .login-box {
    width: 360px;
    border: 1px solid var(--border-hi);
    padding: 40px;
    background: var(--surface);
  }

  .login-logo {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .login-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    margin-bottom: 36px;
  }

  .login-box label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
    margin-top: 20px;
  }

  .login-box label:first-of-type { margin-top: 0; }

  .login-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border-hi);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .login-box input:focus { border-color: var(--accent); }

  .login-btn {
    width: 100%;
    margin-top: 28px;
    padding: 11px;
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .login-btn:hover { opacity: 0.85; }

  .login-error {
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--warn);
    display: none;
  }

  .login-error.visible { display: block; }

  /* ── APP SHELL ──────────────────────────────────────────── */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }

  #app.visible { display: flex; }

  /* ── TOPBAR ─────────────────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: 44px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar-logo {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
  }

  .topbar-model {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .topbar-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .topbar-btn:hover { color: var(--text); border-color: var(--border-hi); }

  /* ── MAIN LAYOUT ────────────────────────────────────────── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── CHAT PANEL ─────────────────────────────────────────── */
  .chat-panel {
    display: flex;
    flex-direction: column;
    width: 50%;
    border-right: 1px solid var(--border);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border-hi); }

  .message { display: flex; flex-direction: column; gap: 4px; }

  .message-role {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .message.user .message-role { color: var(--accent); }

  .message-content {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.assistant .message-content {
    color: #c8c8c8;
  }

  .input-area {
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 0;
    padding: 16px 20px;
  }

  #user-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border-hi);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 160px;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  #user-input:focus { border-color: var(--accent); }

  .send-btn {
    height: 42px;
    padding: 0 18px;
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    border: none;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── DEV PANEL ──────────────────────────────────────────── */
  .dev-panel {
    width: 50%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .dev-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .dev-tab {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 12px 18px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    transition: color 0.15s;
  }

  .dev-tab:hover { color: var(--text); }
  .dev-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .dev-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
  }

  .dev-content::-webkit-scrollbar { width: 4px; }
  .dev-content::-webkit-scrollbar-track { background: transparent; }
  .dev-content::-webkit-scrollbar-thumb { background: var(--border-hi); }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  .dev-empty {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 60px;
  }

  /* ── DEV PANEL CONTENT ──────────────────────────────────── */
  .dev-section { margin-bottom: 24px; }

  .dev-section-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .dev-code {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
    color: #a8d8a8;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-x: auto;
  }

  .dev-code.warn { color: #ff8888; }
  .dev-code.neutral { color: var(--text); }

  .session-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 6px 16px;
  }

  .session-key {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  .session-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    word-break: break-all;
  }

  /* payload messages */
  .payload-msg {
    border-left: 2px solid var(--border-hi);
    padding: 8px 12px;
    margin-bottom: 8px;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
  }

  .payload-msg.role-user    { border-left-color: var(--accent); }
  .payload-msg.role-system  { border-left-color: #888800; }
  .payload-msg.role-assistant { border-left-color: #4488ff; }

  .payload-role {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    color: var(--muted);
  }

  .payload-msg.role-user .payload-role    { color: var(--accent); }
  .payload-msg.role-system .payload-role  { color: #cccc00; }
  .payload-msg.role-assistant .payload-role { color: #6699ff; }

  .payload-text { color: var(--text); white-space: pre-wrap; word-break: break-word; }

  /* thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .thinking-dots span {
    display: inline-block;
    animation: blink 1.2s infinite;
    animation-fill-mode: both;
  }

  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">q7x.ai</div>
    <div class="login-sub">// restricted access</div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="user@domain.com" autocomplete="username">
    <label>Password</label>
    <input type="password" id="login-password" autocomplete="current-password">
    <button class="login-btn" id="login-btn">Authenticate</button>
    <div class="login-error" id="login-error">Invalid credentials.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">q7x.ai</span>
      <span class="topbar-model" id="topbar-model">—</span>
    </div>
    <div class="topbar-right">
      <button class="topbar-btn" id="clear-btn">New Session</button>
      <button class="topbar-btn" id="logout-btn">Logout</button>
    </div>
  </div>

  <div class="main">
    <!-- CHAT -->
    <div class="chat-panel">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <textarea id="user-input" rows="1" placeholder="Message q7x..."></textarea>
        <button class="send-btn" id="send-btn">Send</button>
      </div>
    </div>

    <!-- DEV PANEL -->
    <div class="dev-panel">
      <div class="dev-tabs">
        <button class="dev-tab active" data-tab="steeltrap">Steeltrap</button>
        <button class="dev-tab" data-tab="payload">Payload</button>
        <button class="dev-tab" data-tab="session">Session</button>
      </div>
      <div class="dev-content">
        <div class="tab-pane active" id="tab-steeltrap">
          <div class="dev-empty">Send a message to see Steeltrap queries.</div>
        </div>
        <div class="tab-pane" id="tab-payload">
          <div class="dev-empty">Send a message to inspect the LLM payload.</div>
        </div>
        <div class="tab-pane" id="tab-session">
          <div class="dev-empty">Send a message to see session state.</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────
let lastDebug = null;

// ── DOM ────────────────────────────────────────────────────
const loginScreen  = document.getElementById('login-screen');
const app          = document.getElementById('app');
const loginEmail   = document.getElementById('login-email');
const loginPass    = document.getElementById('login-password');
const loginBtn     = document.getElementById('login-btn');
const loginError   = document.getElementById('login-error');
const messagesEl   = document.getElementById('messages');
const userInput    = document.getElementById('user-input');
const sendBtn      = document.getElementById('send-btn');
const clearBtn     = document.getElementById('clear-btn');
const logoutBtn    = document.getElementById('logout-btn');
const topbarModel  = document.getElementById('topbar-model');

// ── Login ──────────────────────────────────────────────────
async function doLogin() {
  loginError.classList.remove('visible');
  loginBtn.disabled = true;
  loginBtn.textContent = 'Authenticating...';

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email: loginEmail.value, password: loginPass.value})
  });

  loginBtn.disabled = false;
  loginBtn.textContent = 'Authenticate';

  if (res.ok) {
    loginScreen.classList.add('hidden');
    app.classList.add('visible');
    userInput.focus();
  } else {
    loginError.classList.add('visible');
  }
}

loginBtn.addEventListener('click', doLogin);
loginPass.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// ── Logout ─────────────────────────────────────────────────
logoutBtn.addEventListener('click', async () => {
  await fetch('/api/logout', {method: 'POST'});
  location.reload();
});

// ── New Session ────────────────────────────────────────────
clearBtn.addEventListener('click', async () => {
  await fetch('/api/clear', {method: 'POST'});
  messagesEl.innerHTML = '';
  clearDevPanel();
  userInput.focus();
});

// ── Auto-resize textarea ───────────────────────────────────
userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
});

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);

// ── Send ───────────────────────────────────────────────────
async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;

  appendMessage('user', text);
  userInput.value = '';
  userInput.style.height = 'auto';
  sendBtn.disabled = true;

  const thinking = appendThinking();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text})
    });

    thinking.remove();

    if (res.status === 401) {
      loginScreen.classList.remove('hidden');
      app.classList.remove('visible');
      return;
    }

    const data = await res.json();

    if (data.error) {
      appendMessage('assistant', `[error] ${data.error}`);
    } else {
      appendMessage('assistant', data.response);
      lastDebug = data.debug;
      renderDebug(data.debug);
      if (data.debug?.session?.model) {
        topbarModel.textContent = data.debug.session.model;
      }
    }
  } catch(e) {
    thinking.remove();
    appendMessage('assistant', `[network error] ${e.message}`);
  }

  sendBtn.disabled = false;
  userInput.focus();
}

// ── Messages ───────────────────────────────────────────────
function appendMessage(role, content) {
  const el = document.createElement('div');
  el.className = `message ${role}`;
  el.innerHTML = `
    <div class="message-role">${role === 'user' ? 'you' : 'q7x'}</div>
    <div class="message-content">${escHtml(content)}</div>
  `;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

function appendThinking() {
  const el = document.createElement('div');
  el.className = 'message assistant';
  el.innerHTML = `
    <div class="message-role">q7x</div>
    <div class="message-content thinking">
      <span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>
    </div>
  `;
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

// ── Dev Panel ──────────────────────────────────────────────
document.querySelectorAll('.dev-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.dev-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.add('active');
  });
});

function clearDevPanel() {
  document.getElementById('tab-steeltrap').innerHTML = '<div class="dev-empty">Send a message to see Steeltrap queries.</div>';
  document.getElementById('tab-payload').innerHTML = '<div class="dev-empty">Send a message to inspect the LLM payload.</div>';
  document.getElementById('tab-session').innerHTML = '<div class="dev-empty">Send a message to see session state.</div>';
}

function renderDebug(debug) {
  renderSteeltrap(debug.steeltrap);
  renderPayload(debug.payload);
  renderSession(debug.session);
}

function renderSteeltrap(st) {
  const el = document.getElementById('tab-steeltrap');
  if (!st) {
    el.innerHTML = '<div class="dev-empty">Steeltrap disabled or no query made.</div>';
    return;
  }

  let html = '';

  html += `<div class="dev-section">
    <div class="dev-section-label">Query</div>
    <div class="dev-code neutral">${escHtml(st.url || st.query || '—')}</div>
  </div>`;

  if (st.error) {
    html += `<div class="dev-section">
      <div class="dev-section-label">Error</div>
      <div class="dev-code warn">${escHtml(st.error)}</div>
    </div>`;
  } else if (st.result && st.result.length > 0) {
    html += `<div class="dev-section">
      <div class="dev-section-label">Injected Context</div>
      <div class="dev-code">${escHtml(st.result[0].content)}</div>
    </div>`;
  } else {
    html += `<div class="dev-section">
      <div class="dev-section-label">Result</div>
      <div class="dev-code neutral">No matching context found.</div>
    </div>`;
  }

  el.innerHTML = html;
}

function renderPayload(payload) {
  const el = document.getElementById('tab-payload');
  if (!payload || !payload.length) {
    el.innerHTML = '<div class="dev-empty">No payload data.</div>';
    return;
  }

  let html = `<div class="dev-section-label" style="margin-bottom:12px">${payload.length} message(s) sent to LLM</div>`;

  for (const msg of payload) {
    html += `<div class="payload-msg role-${msg.role}">
      <div class="payload-role">${msg.role}</div>
      <div class="payload-text">${escHtml(msg.content)}</div>
    </div>`;
  }

  el.innerHTML = html;
}

function renderSession(sess) {
  const el = document.getElementById('tab-session');
  if (!sess) {
    el.innerHTML = '<div class="dev-empty">No session data.</div>';
    return;
  }

  el.innerHTML = `<div class="session-grid">
    <span class="session-key">session_id</span>
    <span class="session-val">${escHtml(sess.id)}</span>
    <span class="session-key">model</span>
    <span class="session-val">${escHtml(sess.model)}</span>
    <span class="session-key">messages</span>
    <span class="session-val">${sess.message_count}</span>
    <span class="session-key">log</span>
    <span class="session-val">${escHtml(sess.log)}</span>
  </div>`;
}

// ── Utils ──────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
